name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # ── CI: Verificación de archivos requeridos ──────────────────────────────────
  ci:
    name: Integración Continua
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Verificar existencia de home.html
        run: |
          if [ -f "home.html" ]; then
            echo "✅ home.html encontrado."
          else
            echo "❌ ERROR: home.html no existe."
            exit 1
          fi

      - name: Verificar existencia de styles.css
        run: |
          if [ -f "styles.css" ]; then
            echo "✅ styles.css encontrado."
          else
            echo "❌ ERROR: styles.css no existe."
            exit 1
          fi

  # ── CD: Simulación de despliegue a Staging ───────────────────────────────────
  cd:
    name: Despliegue Continuo
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Preparar artefactos
        run: |
          mkdir -p dist
          cp home.html styles.css dist/
          cp login.html dist/ 2>/dev/null || true
          cp listadoUsuarios.html dist/ 2>/dev/null || true
          echo "Archivos en dist/:"
          ls dist/

      - name: Simulación de despliegue
        run: |
          echo "Artefactos listos para el despliegue en el entorno de Staging"
