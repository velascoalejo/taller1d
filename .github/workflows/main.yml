name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── CI: Verificación de archivos requeridos ──────────────────────────────────
  ci:
    name: Integración Continua
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Verificar existencia de home.html
        run: |
          if [ -f "home.html" ]; then
            echo "✅ home.html encontrado."
          else
            echo "❌ ERROR: home.html no existe."
            exit 1
          fi

      - name: Verificar existencia de styles.css
        run: |
          if [ -f "styles.css" ]; then
            echo "✅ styles.css encontrado."
          else
            echo "❌ ERROR: styles.css no existe."
            exit 1
          fi

  # ── CD: Preparar artefactos y desplegar en GitHub Pages ──────────────────────
  cd:
    name: Despliegue Continuo
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Preparar artefactos
        run: |
          mkdir -p dist
          cp home.html styles.css dist/
          cp login.html dist/ 2>/dev/null || true
          cp listadoUsuarios.html dist/ 2>/dev/null || true
          echo "Artefactos listos para el despliegue en el entorno de Staging"
          echo "Archivos en dist/:"
          ls dist/

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v4
        with:
          enablement: true

      - name: Subir artefactos a Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - name: Desplegar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
